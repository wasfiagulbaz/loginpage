<!DOCTYPE html>
<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <title>UMT_LOGIN</title>
        <style>
            body{
                background-image: url(SKT-LMSLoginPage4.jpg);
                background-size:cover;
                background-position:center;
                background-repeat:no-repeat;
                font-family: 'poppins','sans-serif';
            }
            center{
                margin-top: 100px;
            }
            table{
                margin-top: 10px;
                background-color:rgb(255, 255, 255);
                padding: 5px;
                width: 350px;
                margin-bottom: 40px;
            }
            td{
                padding: 12px;
            }
            input[type="text"],input[type="password"] {
                width: 87%;
                padding: 8px;
                box-sizing:content-box;
                margin-bottom: -25px;
                display: flex;
                margin-left: 25px;
                margin-top: -9%;
                background-color: rgb(229, 243, 255);
                border : 1px solid rgb(202, 200, 200);
                outline: whitesmoke;
            }
            button {
                background-color: rgb(8, 118, 161);
                width: 100%;
                padding: 9px;
                color: white;
                cursor:pointer;
                font-size:medium;
            }
            button:hover {
                background-color:rgb(6, 80, 114);
            }
        </style>
    </head>
    <body>
        <center>
            <img src="umt logo 2020.png">
            <table>
                <tr><td>Already have an account?</td></tr>
                <tr><td><i class="fa fa-user-circle"></i><input type="text"></td></tr>
                <tr><td><i class="fa fa-lock"></i><input type="password"></td></tr>
                <tr><td><input type="checkbox">Remember username</td></tr>
                <tr><td><button type="submit">Log in</button></td></tr>
                <tr><td>forgotten your username or password?</td></tr>
            </table>
        </center>
    </body>
</html>
